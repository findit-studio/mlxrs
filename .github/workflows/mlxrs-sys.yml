name: mlxrs-sys

on:
  push:
    branches: [main, mlx]
    paths:
      - 'mlxrs-sys/**'
      - 'xtask/**'
      - 'Cargo.toml'
      - '.github/workflows/mlxrs-sys.yml'
  pull_request:
    paths:
      - 'mlxrs-sys/**'
      - 'xtask/**'
      - 'Cargo.toml'
      - '.github/workflows/mlxrs-sys.yml'
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -Dwarnings
  RUST_BACKTRACE: 1

concurrency:
  group: mlxrs-sys-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: build-test
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install Rust toolchain (nightly)
        # `rustfmt.toml` uses nightly-only directives (`imports_granularity = "Crate"`)
        # — `cargo fmt --check` on stable diverges from local nightly output.
        run: |
          rustup update nightly
          rustup default nightly
          rustup component add rustfmt clippy

      # Capture the mlx-c submodule SHA so the cache key invalidates whenever
      # the submodule moves — even on a header-only patch that leaves
      # CMakeLists.txt unchanged. Without this, a stale target/ cache could
      # restore native artifacts compiled against the previous mlx-c.
      - name: Compute mlx-c submodule SHA
        id: mlxc-sha
        run: echo "sha=$(git -C mlxrs-sys/vendor/mlx-c rev-parse HEAD)" >> $GITHUB_OUTPUT

      # Cache key uses Cargo.toml + cmake inputs + mlx-c submodule SHA
      # (NOT Cargo.lock — gitignored by project policy; the dep-watch.yml
      # weekly cron is the safety net for upstream Rust-side breakage).
      # The `target/` cache covers cmake's build artifacts ($OUT_DIR is
      # under `target/`), so a hit avoids re-downloading + re-compiling MLX.
      - name: Cache cargo registry + target (incl. cmake $OUT_DIR)
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-mlxrs-sys-${{ steps.mlxc-sha.outputs.sha }}-${{ hashFiles('**/Cargo.toml', 'mlxrs-sys/vendor/mlx-c/CMakeLists.txt', 'mlxrs-sys/build.rs') }}
          restore-keys: |
            ${{ runner.os }}-mlxrs-sys-${{ steps.mlxc-sha.outputs.sha }}-
            ${{ runner.os }}-mlxrs-sys-

      - name: cargo fmt
        run: cargo fmt -p mlxrs-sys -- --check

      - name: cargo clippy -p mlxrs-sys
        run: cargo clippy -p mlxrs-sys --all-targets -- -D warnings

      - name: cargo build -p mlxrs-sys
        run: cargo build -p mlxrs-sys

      - name: cargo test -p mlxrs-sys
        run: cargo test -p mlxrs-sys

      - name: cargo doc -p mlxrs-sys
        env:
          RUSTDOCFLAGS: -D warnings
        run: cargo doc -p mlxrs-sys --no-deps

      # Bindings-drift gate: re-run xtask regen-bindings and assert the
      # generated file matches what's committed. Catches accidental drift
      # between the committed bindings.rs and the actual mlx-c headers (e.g.
      # if someone bumps the vendored submodule but forgets to regen).
      - name: Bindings-drift gate
        env:
          LIBCLANG_PATH: /Applications/Xcode.app/Contents/Developer/Toolchains/XcodeDefault.xctoolchain/usr/lib
        run: |
          cargo run -p xtask -- regen-bindings
          git diff --exit-code mlxrs-sys/src/generated/bindings.rs
