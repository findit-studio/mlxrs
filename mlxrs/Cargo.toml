[package]
name = "mlxrs"
version = "0.1.0"
edition.workspace = true
repository.workspace = true
homepage.workspace = true
documentation = "https://docs.rs/mlxrs"
description = "MLX, MLX-LM, and MLX-VLM for Rust"
license.workspace = true
rust-version.workspace = true

[features]
default = []
# The hand-written `core::arch` SIMD kernels (the `mlxrs::simd` module:
# scalar reference + aarch64 NEON backend behind a runtime-detection
# dispatcher) are ALWAYS compiled — there is no `simd` cargo feature.
# Whether the NEON backend runs is gated purely on `target_arch =
# "aarch64"` + runtime CPU detection (`is_aarch64_feature_detected!`),
# with the always-compiled scalar path as the automatic fallback on
# non-aarch64 targets and under `--cfg mlxrs_force_scalar` (a build-cfg
# for regression bisection / exotic-target builds). Matches the `dia`
# reference design.
# Granular, capability-named tokenizer features (minimize deps).
tokenizer            = ["dep:tokenizers"]                                          # HfTokenizer load + encode/decode + special tokens from tokenizer.json. NO serde_json/minijinja.
tokenizer-config     = ["tokenizer", "dep:serde_json"]                             # parse tokenizer_config.json → bos/eos/unk/chat_template/added-tokens
tokenizer-stream     = ["tokenizer"]                                               # StreamingDetokenizer trait + NaiveStreamingDetokenizer (no serde_json)
tokenizer-gpt2       = []                                                          # GPT-2 bytes↔unicode table (committed cargo-xtask-codegen artifact)
tokenizer-bpe        = ["tokenizer-stream", "tokenizer-gpt2", "dep:serde_json"]    # GPT-2 byte-level streaming detok + decoder-class inference
tokenizer-spm        = ["tokenizer-stream", "dep:serde_json"]                      # SentencePiece (+no-space) streaming detok + decoder-class inference
tokenizer-chat       = ["tokenizer-config", "dep:minijinja", "dep:minijinja-contrib", "dep:serde", "dep:jiff"]   # jinja apply_chat_template (jiff: strftime_now)
tokenizer-deepseek-v32 = ["tokenizer-chat"]                                        # the one shipped chat-template override
tokenizer-tools      = ["tokenizer-config", "dep:serde_json"]                      # tool-call parsers + infer_tool_parser
# umbrellas (compose only)
embeddings           = ["tokenizer", "dep:smol_str", "dep:memspan"]                 # encode/decode (tokenizers crate) + `1_Pooling/config.json` parsing (HAND-ROLLED strict-JSON scanner per EMB-1; NO DIRECT `mlxrs::dep:serde_json` — `tokenizers v0.23` still pulls `serde_json` transitively for its `tokenizer.json` parse, so `embeddings` BUILDS but does not OWN `serde_json` after EMB-1. `tokenizer-config`/`tokenizer-bpe`/`tokenizer-spm`/`tokenizer-tools` continue to pull it directly). `smol_str` inlines short keys/values (≤23 bytes) into the JVal payload. `memspan` SIMD-accelerates `skip_ws` (AVX2/AVX-512/NEON dispatch) and the per-string `skip-until-quote-or-backslash` chunk scan, plus enables a no-escape fast path that copies the source slice directly into SmolStr with zero intermediate Vec.
lm                   = ["tokenizer-config", "tokenizer-stream", "tokenizer-spm", "tokenizer-bpe", "tokenizer-chat", "tokenizer-deepseek-v32", "tokenizer-tools"]
vlm                  = ["lm", "dep:image"]
audio                = ["lm", "dep:symphonia"] # mirrors mlx-audio's Python dep on mlx-lm; symphonia = WAV codec for audio::io. The always-compiled `mlxrs::simd` module accelerates the integrated_loudness sum-of-squares (NEON on aarch64, scalar fallback elsewhere) — no feature gate needed.
unstable-ops-overload = []               # `&a + &b` etc. (panic on shape error). OFF by default.
gguf                 = []                                                          # GGUF load/save (mlx-c `mlx_io_gguf*`). OFF: mlxrs-sys does not yet link gguflib.

[dependencies]
mlxrs-sys.workspace = true
thiserror.workspace = true
half.workspace = true
smallvec.workspace = true
static_assertions.workspace = true
ctor.workspace = true
libc = "0.2"                          # SIGABRT diagnostics handler (diagnostics.rs)
tokenizers = { version = "0.23", default-features = false, features = ["onig"], optional = true }
minijinja = { version = "2", features = ["loader", "json", "loop_controls", "builtins", "preserve_order"], optional = true }
minijinja-contrib = { version = "2", features = ["pycompat"], optional = true }
serde = { version = "1", features = ["derive"], optional = true }
serde_json = { version = "1", optional = true, features = ["preserve_order"] }
# Small-string optimization for `embeddings::config::JVal::Str` payloads.
# Pooling-config keys/values are short ASCII strings ("mean"/"max"/
# "cls_token"/"pooling_mode_mean_tokens") that fit in SmolStr's 23-byte
# inline buffer — no heap allocation per JVal. Pulled SOLELY by
# `embeddings`. Loose caret semver per `feedback_no_dependency_pinning`
# (crates.io current major is 0.3.x — verified 0.3.6).
smol_str = { version = "0.3", optional = true }
# SIMD-accelerated byte-class scanning for the `embeddings::config`
# strict-JSON scanner. Verified the published `memspan v0.1.0`
# matches the repository metadata (`github.com/al8n/memspan`) and the
# `cargo info memspan` crates.io entry byte-identically: name, version,
# license, repo, description, keywords. Pulled SOLELY by `embeddings`.
# Loose caret semver per `feedback_no_dependency_pinning`.
memspan = { version = "0.1", optional = true }
# `strftime_now` chat-template helper only — pulled SOLELY by `tokenizer-chat`
# (`dep:jiff`), never by the serde_json-free `tokenizer` core, the
# stream/bpe/spm features, or `[build-dependencies]`. Local-now formatted per
# Python `datetime.now().strftime`. Loose caret semver (crates.io current
# major is 0.2.x — verified 0.2.24); never an exact `=` pin.
jiff = { version = "0.2", optional = true }
# Image decode / resize / channel access. Pulled SOLELY by `vlm` (see the
# umbrella above's `dep:image`); the bare/core / lm / audio / embeddings
# graphs never compile it. Loose caret semver per
# `feedback_no_dependency_pinning` (crates.io current major is 0.25.x,
# verified 0.25.10) — never an exact `=` pin.
image = { version = "0.25", default-features = false, features = ["png", "jpeg"], optional = true }
# NOTE: the resize hot path is OWNED by mlxrs (`src/vlm/resize.rs`), NOT a
# third-party crate. The former `fast_image_resize` dependency was dropped
# because its internal scratch (coefficient tables, per-row work buffers)
# allocated INFALLIBLY inside the crate — and `vlm::image::resize`'s target
# dimensions flow from an untrusted loaded `preprocessor_config.json`, so a
# hostile-but-under-cap target could `abort()` the process despite our
# `Result`. The own kernel is fully `try_reserve_exact`-fallible, NEON-
# accelerated on aarch64 (scalar fallback always compiled), and bit-exact
# with PIL `Image.resize` (the reference mlx-vlm preprocessing expects).
# Multi-format audio decoder (pure-Rust, actively maintained; WAV+PCM
# today, MP3/FLAC/OGG/etc. become opt-in via additional feature flags in
# future PRs). `default-features = false` keeps the dep tree minimal —
# only `wav` + `pcm` are enabled for the current core surface. The WAV
# *encoder* side is roll-our-own (~80 LOC in audio/io.rs::save_wav);
# symphonia has no public encoder API.
symphonia = { version = "0.6", optional = true, default-features = false, features = ["wav", "pcm"] }

# No [build-dependencies]: ALL tokenizer codegen moved to the `xtask` crate
# (`cargo xtask-codegen`), so a normal `mlxrs` build never compiles
# `tokenizers`/`serde_json`/`toml`. build.rs now only does tarpaulin-cfg
# detection (std-only). Regenerated artifacts are committed source
# (src/tokenizer/generated.rs, tests/fixtures/*.json); `cargo xtask-codegen
# --check` is the drift guard against mlxrs/data/tokenizer/.

[dev-dependencies]
approx.workspace = true
trybuild.workspace = true
criterion = "0.8"
libc = "0.2"                          # SIGABRT child-process test (tests/diagnostics.rs)

[package.metadata.docs.rs]
all-features = true
rustdoc-args = ["--cfg", "docsrs"]

[lints]
workspace = true

[[bench]]
name = "arithmetic"
harness = false

[[bench]]
name = "reduction"
harness = false

[[bench]]
name = "shape"
harness = false

[[bench]]
name = "linalg"
harness = false
