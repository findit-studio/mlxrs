[package]
name = "mlxrs"
version = "0.1.0"
edition.workspace = true
repository.workspace = true
homepage.workspace = true
documentation = "https://docs.rs/mlxrs"
description = "MLX, MLX-LM, and MLX-VLM for Rust"
license.workspace = true
rust-version.workspace = true

[features]
default = []
tokenizer            = ["dep:tokenizers"]                                          # HfTokenizer load + encode/decode + special tokens from tokenizer.json. NO serde_json/minijinja.
tokenizer-config     = ["tokenizer", "dep:serde_json"]                             # parse tokenizer_config.json → bos/eos/unk/chat_template/added-tokens
tokenizer-stream     = ["tokenizer"]                                               # StreamingDetokenizer trait + NaiveStreamingDetokenizer (no serde_json)
tokenizer-gpt2       = []                                                          # GPT-2 bytes↔unicode table (committed cargo-xtask-codegen artifact)
tokenizer-bpe        = ["tokenizer-stream", "tokenizer-gpt2", "dep:serde_json"]    # GPT-2 byte-level streaming detok + decoder-class inference
tokenizer-spm        = ["tokenizer-stream", "dep:serde_json"]                      # SentencePiece (+no-space) streaming detok + decoder-class inference
tokenizer-chat       = ["tokenizer-config", "dep:minijinja", "dep:minijinja-contrib", "dep:serde", "dep:jiff"]   # jinja apply_chat_template (jiff: strftime_now)
tokenizer-deepseek-v32 = ["tokenizer-chat"]                                        # the one shipped chat-template override
tokenizer-tools      = ["tokenizer-config", "dep:serde_json"]                      # tool-call parsers + infer_tool_parser

embeddings           = ["tokenizer", "dep:smol_str", "dep:memspan", "dep:glob"]     
lm                   = ["tokenizer-config", "tokenizer-stream", "tokenizer-spm", "tokenizer-bpe", "tokenizer-chat", "tokenizer-deepseek-v32", "tokenizer-tools", "dep:regex"]
vlm                  = ["lm", "dep:image"]
audio                = ["lm", "dep:symphonia"]
unstable-ops-overload = []
gguf                 = [] # GGUF load/save (mlx-c `mlx_io_gguf*`). OFF: mlxrs-sys does not yet link gguflib.

[dependencies]
mlxrs-sys.workspace = true
thiserror.workspace = true
half.workspace = true
smallvec.workspace = true
static_assertions.workspace = true
ctor.workspace = true
libc = "0.2"                          # SIGABRT diagnostics handler (diagnostics.rs)
tokenizers = { version = "0.23", default-features = false, features = ["onig"], optional = true }
minijinja = { version = "2", features = ["loader", "json", "loop_controls", "builtins", "preserve_order"], optional = true }
minijinja-contrib = { version = "2", features = ["pycompat"], optional = true }
serde = { version = "1", features = ["derive"], optional = true }
serde_json = { version = "1", optional = true, features = ["preserve_order"] }
smol_str = { version = "0.3", optional = true }
memspan = { version = "0.1", optional = true }
glob = { version = "0.3", optional = true }
jiff = { version = "0.2", optional = true }
image = { version = "0.25", default-features = false, features = ["png", "jpeg"], optional = true }
# Multi-format audio decoder (pure-Rust, actively maintained).
# `default-features = false` keeps the dep tree minimal — we enable
# exactly the codecs/containers `mlx_audio.audio_io.read` decodes
# without an external `ffmpeg` process:
#   - `wav`  + `pcm`    — RIFF/WAVE container + PCM codec (WAV)
#   - `mp3`             — MPEG-1/2 Layer III (`symphonia-bundle-mp3`)
#   - `flac`            — FLAC (`symphonia-bundle-flac`)
#   - `ogg` + `vorbis`  — OGG container + Vorbis codec (the `.ogg`/
#                         `vorbis` arm of mlx-audio's miniaudio path).
#                         BOTH are required: `ogg` is the container
#                         demuxer, `vorbis` is the audio codec.
# mlx-audio additionally routes M4A/AAC/Opus/WebM through an external
# `ffmpeg` subprocess; Opus in particular has NO pure-Rust symphonia
# codec in 0.6.0 (no `opus` feature, no `symphonia-codec-opus` crate —
# it remains an open upstream issue), and the alternatives all need a
# heavy `libopus`/`ffmpeg` C dependency. Per the minimal-deps project
# rule those formats are deliberately scoped OUT of mlxrs's in-process
# decoder — see `audio/io.rs` and `audio/mod.rs` for the fence.
# The WAV *encoder* side is roll-our-own (~80 LOC in
# audio/io.rs::save_wav); symphonia has no public encoder API.
symphonia = { version = "0.6", optional = true, default-features = false, features = [
  "wav",
  "pcm",
  "mp3",
  "flac",
  "ogg",
  "vorbis",
] }
regex = { version = "1", optional = true, default-features = false, features = ["std", "perf"] }

[dev-dependencies]
approx.workspace = true
trybuild.workspace = true
criterion = "0.8"
libc = "0.2" # SIGABRT child-process test (tests/diagnostics.rs)

[package.metadata.docs.rs]
all-features = true
rustdoc-args = ["--cfg", "docsrs"]

[lints]
workspace = true

[[bench]]
name = "arithmetic"
harness = false

[[bench]]
name = "reduction"
harness = false

[[bench]]
name = "shape"
harness = false

[[bench]]
name = "linalg"
harness = false
