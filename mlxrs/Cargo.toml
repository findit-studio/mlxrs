[package]
name = "mlxrs"
version = "0.1.0"
edition.workspace = true
repository.workspace = true
homepage.workspace = true
documentation = "https://docs.rs/mlxrs"
description = "MLX, MLX-LM, and MLX-VLM for Rust"
license.workspace = true
rust-version.workspace = true

[features]
default = []
lm = []
vlm = []
embeddings = []
audio = ["lm"]                       # mirrors mlx-audio's Python dep on mlx-lm
unstable-ops-overload = []           # `&a + &b` etc. (panic on shape error). OFF by default.

[dependencies]
mlxrs-sys.workspace = true
thiserror.workspace = true
half.workspace = true
smallvec.workspace = true
static_assertions.workspace = true
ctor.workspace = true

[dev-dependencies]
approx.workspace = true
trybuild.workspace = true
criterion = "0.8"

[package.metadata.docs.rs]
all-features = true
rustdoc-args = ["--cfg", "docsrs"]

[lints]
workspace = true
